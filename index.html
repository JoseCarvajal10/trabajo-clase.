<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Coffee</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MENU -->

    <header class="menu">

        <h2>Urban Coffee</h2>

        <nav>
            <a href="#">Inicio</a>
            <a href="#">Menú</a>
            <a href="#">Promos</a>
            <a href="#">Contacto</a>
        </nav>

    </header>

    <!-- PRINCIPAL -->

    <section class="principal">

        <div class="texto">

            <h1>El mejor café de la ciudad</h1>

            <p>
                Disfruta bebidas únicas y un ambiente moderno
                diseñado para compartir y relajarte.
            </p>

            <button>Ordenar Ahora</button>

        </div>

        <div class="imagen">
            <img src="https://picsum.photos/400/400?coffee">
        </div>

    </section>

    <!-- SERVICIOS -->

    <section class="servicios">

        <div class="caja">
            <h3>Café Premium</h3>
            <p>Preparado con granos seleccionados.</p>
        </div>

        <div class="caja">
            <h3>WiFi Gratis</h3>
            <p>Trabaja y estudia sin límites.</p>
        </div>

        <div class="caja">
            <h3>Ambiente Moderno</h3>
            <p>Espacios cómodos y elegantes.</p>
        </div>

    </section>

</body>
</html>
